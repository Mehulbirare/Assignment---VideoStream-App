apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // React Native gradle plugin configuration. Defaults are fine for this app.
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

// Resolve the OpenCV SDK CMake config path (see gradle.properties / README).
// Must be ABSOLUTE: CMake resolves a relative <pkg>_DIR against its build
// directory (deep under .cxx/), not the project, so a relative path fails.
// file() resolves the (possibly relative) value against this module dir
// (android/app), and we normalize backslashes for CMake.
def opencvSdkRel = project.hasProperty('opencvSdkPath')
        ? project.property('opencvSdkPath')
        : '../opencv/sdk/native/jni'
def opencvSdkPath = file(opencvSdkRel).absolutePath.replace('\\', '/')

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.edgevision"

    defaultConfig {
        applicationId "com.edgevision"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -frtti -fexceptions"
                arguments "-DOpenCV_DIR=${opencvSdkPath}",
                        "-DANDROID_STL=c++_shared"
            }
        }

        ndk {
            abiFilters(*rootProject.ext.reactNativeArchitectures.split(","))
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    // CameraX — capture + frame analysis
    implementation "androidx.camera:camera-core:${rootProject.ext.cameraxVersion}"
    implementation "androidx.camera:camera-camera2:${rootProject.ext.cameraxVersion}"
    implementation "androidx.camera:camera-lifecycle:${rootProject.ext.cameraxVersion}"
    implementation "androidx.camera:camera-view:${rootProject.ext.cameraxVersion}"

    implementation "androidx.core:core-ktx:1.12.0"

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// React Native autolinking (RN 0.73): generates com.facebook.react.PackageList
// and links any installed native modules into the app.
apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
applyNativeModulesAppBuildGradle(project)
