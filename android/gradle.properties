org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
android.useAndroidX=true
android.enableJetifier=false

# React Native architecture flags
newArchEnabled=false
hermesEnabled=true

# Build native libs only for common device ABIs to keep build times sane.
# arm64-v8a covers virtually all modern physical devices; x86_64 covers the
# Android emulator. Add armeabi-v7a if you target older 32-bit hardware.
reactNativeArchitectures=arm64-v8a,x86_64

# Path to the unpacked OpenCV Android SDK's CMake config dir (see README).
# Override per-machine in android/local.properties or via -P if needed.
opencvSdkPath=../opencv/sdk/native/jni
